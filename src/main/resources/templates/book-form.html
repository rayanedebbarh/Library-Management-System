<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
AI Usage Documentation:
- Claude AI (Anthropic) assisted with Thymeleaf form binding and Spring model attributes
-->
<head>
    <meta charset="UTF-8">
    <title th:text="${book.id == null ? 'Add New Book' : 'Edit Book'}">Book Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        form {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-save {
            background-color: #28a745;
            color: white;
        }
        .btn-cancel {
            background-color: #6c757d;
            color: white;
        }
    </style>
</head>
<body>
<h1 th:text="${book.id == null ? 'Add New Book' : 'Edit Book'}">Book Form</h1>

<form th:action="@{/web/books/save}" method="post" th:object="${book}">
    <input type="hidden" th:field="*{id}" />

    <div class="form-group">
        <label for="title">Title:</label>
        <input type="text" id="title" th:field="*{title}" required />
    </div>

    <div class="form-group">
        <label for="author">Author:</label>
        <input type="text" id="author" th:field="*{author}" required />
    </div>

    <div class="form-group">
        <label for="year">Year:</label>
        <input type="number" id="year" th:field="*{year}" required />
    </div>

    <div class="form-group">
        <label for="library">Library (Optional):</label>
        <select id="library" name="libraryId">
            <option value="">-- None --</option>
            <option th:each="lib : ${libraries}"
                    th:value="${lib.id}"
                    th:text="${lib.name}"
                    th:selected="${book.library != null && book.library.id == lib.id}">
            </option>
        </select>
    </div>

    <button type="submit" class="btn btn-save">💾 Save</button>
    <a th:href="@{/web/books}" class="btn btn-cancel">❌ Cancel</a>
</form>
</body>
</html>
