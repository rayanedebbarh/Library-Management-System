<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
AI Usage Documentation:
- Claude AI (Anthropic) assisted with Thymeleaf syntax for library listing
-->
<head>
  <meta charset="UTF-8">
  <title>Libraries List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 20px auto;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: left;
    }
    th {
      background-color: #007bff;
      color: white;
    }
    .btn {
      padding: 5px 10px;
      text-decoration: none;
      border-radius: 3px;
      margin-right: 5px;
    }
    .btn-edit {
      background-color: #28a745;
      color: white;
    }
    .btn-delete {
      background-color: #dc3545;
      color: white;
    }
    .btn-new {
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
    }
    .btn-home {
      background-color: #6c757d;
      color: white;
      padding: 10px 20px;
    }
  </style>
</head>
<body>
<h1>Libraries List</h1>

<div>
  <a th:href="@{/web/libraries/new}" class="btn btn-new">➕ Add New Library</a>
  <a th:href="@{/web/}" class="btn btn-home">🏠 Home</a>
</div>

<table>
  <thead>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>City</th>
    <th>Number of Books</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="library : ${libraries}">
    <td th:text="${library.id}"></td>
    <td th:text="${library.name}"></td>
    <td th:text="${library.city}"></td>
    <td th:text="${library.books.size()}"></td>
    <td>
      <a th:href="@{/web/libraries/edit/{id}(id=${library.id})}" class="btn btn-edit">Edit</a>
      <a th:href="@{/web/libraries/delete/{id}(id=${library.id})}"
         class="btn btn-delete"
         onclick="return confirm('Are you sure you want to delete this library?')">Delete</a>
    </td>
  </tr>
  <tr th:if="${#lists.isEmpty(libraries)}">
    <td colspan="5">No libraries found. Add a new library to get started!</td>
  </tr>
  </tbody>
</table>
</body>
</html>
